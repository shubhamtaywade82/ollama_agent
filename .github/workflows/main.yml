name: Ruby Gem CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - "3.3.4"
          - "3.2.0"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run RSpec
        run: bundle exec rspec

      # Full-tree RuboCop is non-blocking until legacy Metrics cops are reduced; see CONTRIBUTING.md.
      - name: Run RuboCop
        run: bundle exec rubocop
        continue-on-error: true

  trading_agent:
    runs-on: ubuntu-latest
    name: trading_agent Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - "3.3.4"
          - "3.2.0"

    defaults:
      run:
        working-directory: trading_agent

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          working-directory: trading_agent

      - name: Run RSpec
        run: bundle exec rspec
