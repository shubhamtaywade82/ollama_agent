AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  Exclude:
    - "*.gemspec"
    - "db/**/*.sql"
    - "reproduce_429.rb"
plugins:
  - rubocop-rake
  - rubocop-rspec

Metrics/BlockLength:
  Exclude:
    - "spec/**/*_spec.rb"

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# Integration-style examples often need more lines and expectations than micro-examples.
RSpec/ExampleLength:
  Max: 30
  Exclude:
    - spec/ollama_agent/runtime/storage_concurrency_spec.rb
    - spec/ollama_agent/runtime/storage_replay_spec.rb

RSpec/MultipleExpectations:
  Max: 10

# Acceptance specs may describe a class whose primary spec lives under another filename.
RSpec/SpecFilePathFormat:
  Exclude:
    - spec/ollama_agent/runtime/storage_concurrency_spec.rb
    - spec/ollama_agent/runtime/storage_replay_spec.rb
    - spec/ollama_agent/security/owners_yml_fixture_spec.rb

RSpec/DescribeClass:
  Exclude:
    - spec/ollama_agent/security/owners_yml_fixture_spec.rb

RSpec/DescribeMethod:
  Exclude:
    - spec/ollama_agent/security/owners_yml_fixture_spec.rb
