AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  Exclude:
    - "*.gemspec"
    - "db/**/*.sql"
    - "reproduce_429.rb"
plugins:
  - rubocop-rake
  - rubocop-rspec

Metrics/BlockLength:
  Exclude:
    - "spec/**/*_spec.rb"

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# Integration-style examples often need more lines and expectations than micro-examples.
RSpec/ExampleLength:
  Max: 30
  Exclude:
    - spec/ollama_agent/runtime/storage_concurrency_spec.rb
    - spec/ollama_agent/runtime/storage_replay_spec.rb
    - spec/ollama_agent/runtime/atomic_mutator_spec.rb
    - spec/ollama_agent/runtime/lock_deadlock_fuzz_spec.rb
    - spec/ollama_agent/runtime/saga_recovery_spec.rb
    - spec/ollama_agent/runtime/compensation_engine_spec.rb
    - spec/ollama_agent/runtime/saga_recovery_daemon_spec.rb

RSpec/MultipleExpectations:
  Max: 10

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/DescribeClass:
  Enabled: false

RSpec/DescribeMethod:
  Exclude:
    - spec/ollama_agent/security/owners_yml_fixture_spec.rb

Metrics/AbcSize:
  Max: 1000

Metrics/CyclomaticComplexity:
  Max: 1000

Metrics/MethodLength:
  Max: 1000

Metrics/PerceivedComplexity:
  Max: 1000

Metrics/ClassLength:
  Max: 10000

Naming/MethodParameterName:
  Enabled: false

RSpec/MessageSpies:
  Enabled: false

RSpec/SubjectStub:
  Enabled: false

RSpec/VerifiedDoubles:
  Enabled: false

RSpec/ContextWording:
  Enabled: false

Lint/RedundantCopDisableDirective:
  Enabled: false

RSpec/StubbedMock:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Max: 10

RSpec/VerifiedDoubleReference:
  Enabled: false

Metrics/ParameterLists:
  Max: 100

Layout/LineLength:
  Enabled: false

Style/Documentation:
  Enabled: false

Lint/DuplicateBranch:
  Enabled: false

Lint/UnusedMethodArgument:
  Enabled: false

Style/ComparableClamp:
  Enabled: false

Metrics/ModuleLength:
  Max: 10000

Lint/SuppressedException:
  Enabled: false

Style/SafeNavigationChainLength:
  Max: 10

Naming/PredicateMethod:
  Enabled: false

Naming/AccessorMethodName:
  Enabled: false

Style/OneClassPerFile:
  Enabled: false

