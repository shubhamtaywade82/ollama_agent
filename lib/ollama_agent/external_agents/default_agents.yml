# Default external agents (override via ~/.config/ollama_agent/agents.yml or OLLAMA_AGENT_EXTERNAL_AGENTS_CONFIG).
# argv/version_argv are retained for config merge compatibility; delegation uses transport: anthropic_api.
# Placeholders binary, task_file, root are not used by the HTTPS runner (E13+).
version: 1
agents:
  - id: claude_cli
    transport: anthropic_api
    model: claude-opus-4-7
    binary: claude
    env_path: OLLAMA_AGENT_CLAUDE_CLI_PATH
    capabilities:
      - code_edit
      - large_context
    argv:
      - "%{binary}"
      - "-p"
      - "%{task_file}"
    version_argv:
      - "%{binary}"
      - "--version"
    timeout_sec: 600

  - id: gemini_cli
    transport: anthropic_api
    model: claude-opus-4-7
    binary: gemini
    env_path: OLLAMA_AGENT_GEMINI_CLI_PATH
    capabilities:
      - code_edit
    argv:
      - "%{binary}"
      - "-p"
      - "%{task_file}"
    version_argv:
      - "%{binary}"
      - "--version"
    timeout_sec: 600

  - id: codex_cli
    transport: anthropic_api
    model: claude-opus-4-7
    binary: codex
    env_path: OLLAMA_AGENT_CODEX_CLI_PATH
    capabilities:
      - code_edit
    argv:
      - "%{binary}"
      - "exec"
      - "%{task_file}"
    version_argv:
      - "%{binary}"
      - "--version"
    timeout_sec: 600

  - id: cursor_cli
    transport: anthropic_api
    model: claude-opus-4-7
    binary: cursor
    env_path: OLLAMA_AGENT_CURSOR_CLI_PATH
    capabilities:
      - code_edit
    argv:
      - "%{binary}"
      - "-p"
      - "%{task_file}"
    version_argv:
      - "%{binary}"
      - "--version"
    timeout_sec: 600
